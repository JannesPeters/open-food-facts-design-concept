name: Deploy production to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate Vercel configuration
        run: |
          if [ -z "$VERCEL_ORG_ID" ]; then
            echo "Missing repository variable: VERCEL_ORG_ID"
            exit 1
          fi

          if [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing repository variable: VERCEL_PROJECT_ID"
            exit 1
          fi

          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "Missing repository secret: VERCEL_TOKEN"
            exit 1
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
